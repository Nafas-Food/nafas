services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: nafas-backend-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    command: npm run start:dev
