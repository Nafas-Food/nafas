name: admin

on:
  pull_request:
    paths:
      - 'admin/**'
      - '.github/workflows/admin.yml'
  push:
    branches: [main]
    paths:
      - 'admin/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
