<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAFE; padding: 20px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid #E4E2F8; }
  .row:last-child { border-bottom: none; }
  .meta { width: 90px; flex-shrink: 0; font-size: 10px; color: #7C7A9E; font-family: monospace; }
  .sample { color: #0D0B1E; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">28px / 700</div>
    <div class="sample" style="font-size:28px;font-weight:700;line-height:1.2;">Page Title</div>
  </div>
  <div class="row">
    <div class="meta">20px / 700</div>
    <div class="sample" style="font-size:20px;font-weight:700;">Section Title</div>
  </div>
  <div class="row">
    <div class="meta">17px / 600</div>
    <div class="sample" style="font-size:17px;font-weight:600;">Card Title</div>
  </div>
  <div class="row">
    <div class="meta">16px / 400</div>
    <div class="sample" style="font-size:16px;font-weight:400;">Body Large</div>
  </div>
  <div class="row">
    <div class="meta">15px / 400</div>
    <div class="sample" style="font-size:15px;font-weight:400;">Body Default</div>
  </div>
  <div class="row">
    <div class="meta">14px / 400</div>
    <div class="sample" style="font-size:14px;font-weight:400;color:#7C7A9E;">Body Small / Muted</div>
  </div>
  <div class="row">
    <div class="meta">13px / 400</div>
    <div class="sample" style="font-size:13px;font-weight:400;color:#7C7A9E;">Caption</div>
  </div>
  <div class="row">
    <div class="meta">12px / 500</div>
    <div class="sample" style="font-size:12px;font-weight:500;color:#7C7A9E;">Micro</div>
  </div>
  <div class="row">
    <div class="meta">10px / 600</div>
    <div class="sample" style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#F59E0B;">EYEBROW LABEL</div>
  </div>
</body>
</html>
