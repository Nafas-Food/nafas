<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAF7F2; padding: 20px; }
  .field { margin-bottom: 18px; max-width: 320px; }
  .label { font-size: 13px; font-weight: 600; color: #2C1F14; margin-bottom: 7px; }
  .input-wrap {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1.5px solid #EDE6DA;
    border-radius: 14px; padding: 13px 14px;
    transition: border-color .15s, box-shadow .15s;
  }
  .input-wrap.focused { border-color: #C4622D; box-shadow: 0 0 0 3px rgba(196,98,45,.13); }
  .input-wrap.error   { border-color: #C0392B; }
  .input-wrap.disabled { opacity: .5; pointer-events: none; }
  .fake-input { flex: 1; font-size: 15px; color: #B8A898; font-family: 'Inter', sans-serif; }
  .fake-input.filled { color: #2C1F14; }
  svg { flex-shrink: 0; }
  .helper { font-size: 12px; color: #6B5040; margin-top: 6px; }
  .helper.error-text { color: #C0392B; }
  .error-box {
    display: flex; align-items: center; gap: 8px;
    background: #FEE2E2; border: 1px solid rgba(192,57,43,.25);
    border-radius: 12px; padding: 10px 12px; max-width: 360px; margin-bottom: 18px;
  }
  .error-box span { font-size: 13px; color: #C0392B; }
</style>
</head>
<body>

  <div class="field">
    <div class="label">Mobile Number</div>
    <div class="input-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B8A898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V19a2 2 0 01-2.18 2A19.86 19.86 0 013 4.18 2 2 0 015 2h2.09a2 2 0 012 1.72c.128.96.338 1.905.625 2.82a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.916.287 1.86.497 2.82.625A2 2 0 0122 16.92z"/></svg>
      <div class="fake-input">01X XXXX XXXX</div>
    </div>
    <div class="helper">Default state</div>
  </div>

  <div class="field">
    <div class="label">Password</div>
    <div class="input-wrap focused">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C4622D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <div class="fake-input filled">••••••••</div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B8A898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="helper">Focused state — terracotta ring</div>
  </div>

  <div class="field">
    <div class="label">Full Name</div>
    <div class="input-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B8A898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <div class="fake-input filled">Sara Al-Farouk</div>
    </div>
    <div class="helper">Filled state</div>
  </div>

  <div class="field">
    <div class="label">Mobile Number</div>
    <div class="input-wrap error">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V19a2 2 0 01-2.18 2A19.86 19.86 0 013 4.18 2 2 0 015 2h2.09a2 2 0 012 1.72c.128.96.338 1.905.625 2.82a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.916.287 1.86.497 2.82.625A2 2 0 0122 16.92z"/></svg>
      <div class="fake-input filled" style="color:#2C1F14">0100</div>
    </div>
    <div class="helper error-text">Please enter a valid mobile number</div>
  </div>

  <div class="field">
    <div class="label">Email (optional)</div>
    <div class="input-wrap disabled">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#B8A898" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <div class="fake-input">email@example.com</div>
    </div>
    <div class="helper">Disabled state</div>
  </div>

  <div class="error-box">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>Invalid mobile number or password. Please try again.</span>
  </div>

</body>
</html>
