<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAFE; padding: 20px; }
  .field { margin-bottom: 14px; }
  .label { font-size: 12px; font-weight: 600; color: #0D0B1E; margin-bottom: 6px; }
  .input-wrap { display: flex; align-items: center; gap: 10px; background: #fff; border: 1.5px solid #E4E2F8; border-radius: 14px; padding: 12px 14px; }
  .input-wrap.focused { border-color: #4F46E5; }
  .input-wrap.error { border-color: #DC2626; background: #fff5f5; }
  .fake-input { flex: 1; font-size: 14px; color: #7C7A9E; }
  .fake-input.filled { color: #0D0B1E; }
  svg { flex-shrink: 0; }
  .error-msg { display: flex; align-items: center; gap: 5px; margin-top: 6px; font-size: 12px; color: #DC2626; }
</style>
</head>
<body>
  <div class="field">
    <div class="label">Mobile Number</div>
    <div class="input-wrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7C7A9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V19a2 2 0 01-2.18 2A19.86 19.86 0 013 4.18 2 2 0 015 2h2.09a2 2 0 012 1.72c.128.96.338 1.905.625 2.82a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.916.287 1.86.497 2.82.625A2 2 0 0122 16.92z"/></svg>
      <div class="fake-input">01X XXXX XXXX</div>
    </div>
  </div>
  <div class="field">
    <div class="label">Password</div>
    <div class="input-wrap focused">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#4F46E5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <div class="fake-input filled">••••••••</div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7C7A9E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
  </div>
  <div class="field">
    <div class="label">Mobile Number</div>
    <div class="input-wrap error">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92V19a2 2 0 01-2.18 2A19.86 19.86 0 013 4.18 2 2 0 015 2h2.09a2 2 0 012 1.72c.128.96.338 1.905.625 2.82a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.916.287 1.86.497 2.82.625A2 2 0 0122 16.92z"/></svg>
      <div class="fake-input filled" style="color:#0D0B1E;">0100</div>
    </div>
    <div class="error-msg">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Please enter a valid mobile number.
    </div>
  </div>
</body>
</html>
