<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAFE; padding: 20px; }
  .grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: #4F46E5; width: 52px; height: 52px; }
  .name { font-size: 10px; color: #7C7A9E; text-align: center; }
  .val  { font-size: 10px; color: #0D0B1E; font-weight: 600; text-align: center; font-family: monospace; }
  .shadow-demo { background: #fff; border: 1px solid #E4E2F8; border-radius: 16px; padding: 14px 18px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .section-label { font-size: 10px; font-weight: 600; color: #7C7A9E; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="section-label">Border Radius</div>
<div class="grid">
  <div class="item"><div class="box" style="border-radius:4px;"></div><div class="name">micro</div><div class="val">4px</div></div>
  <div class="item"><div class="box" style="border-radius:10px;"></div><div class="name">icon-sm</div><div class="val">10px</div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="name">icon</div><div class="val">12px</div></div>
  <div class="item"><div class="box" style="border-radius:14px;"></div><div class="name">input</div><div class="val">14px</div></div>
  <div class="item"><div class="box" style="border-radius:16px;"></div><div class="name">card</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="border-radius:18px;"></div><div class="name">card-lg</div><div class="val">18px</div></div>
  <div class="item"><div class="box" style="border-radius:100px;"></div><div class="name">pill</div><div class="val">100px</div></div>
  <div class="item"><div class="box" style="border-radius:50%;"></div><div class="name">avatar</div><div class="val">50%</div></div>
</div>
<div class="section-label">Shadows</div>
<div class="shadow-demo" style="box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
  <div style="font-size:11px;font-weight:600;color:#0D0B1E;">shadow-card</div>
  <div style="font-size:10px;color:#7C7A9E;font-family:monospace;">0 2px 8px rgba(0,0,0,0.06)</div>
</div>
<div class="shadow-demo" style="box-shadow: 0 8px 32px rgba(79,70,229,0.12);">
  <div style="font-size:11px;font-weight:600;color:#0D0B1E;">shadow-float (tab bar)</div>
  <div style="font-size:10px;color:#7C7A9E;font-family:monospace;">0 8px 32px rgba(79,70,229,0.12)</div>
</div>
</body>
</html>
