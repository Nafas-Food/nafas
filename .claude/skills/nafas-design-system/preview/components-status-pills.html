<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAFAFE; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .section-label { font-size: 10px; font-weight: 600; color: #7C7A9E; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  /* Floating chef tab bar */
  .tab-bar { display: flex; align-items: center; background: #fff; border: 1px solid #E4E2F8; border-radius: 100px; padding: 6px; gap: 2px; box-shadow: 0 8px 32px rgba(79,70,229,0.12); width: fit-content; }
  .tab { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 100px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .tab-active { background: #4F46E5; color: #fff; }
  .tab-inactive { color: #7C7A9E; padding: 8px 12px; }
</style>
</head>
<body>
<div class="section-label">Order Status Pills</div>
<div class="row">
  <div class="pill" style="background:#F59E0B20;color:#F59E0B;"><div class="dot" style="background:#F59E0B;"></div>Pending</div>
  <div class="pill" style="background:#3B82F620;color:#3B82F6;"><div class="dot" style="background:#3B82F6;"></div>Confirmed</div>
  <div class="pill" style="background:#8B5CF620;color:#8B5CF6;"><div class="dot" style="background:#8B5CF6;"></div>Preparing</div>
  <div class="pill" style="background:#10B98120;color:#10B981;"><div class="dot" style="background:#10B981;"></div>Ready</div>
  <div class="pill" style="background:#6366F120;color:#6366F1;"><div class="dot" style="background:#6366F1;"></div>On the Way</div>
  <div class="pill" style="background:#16A34A20;color:#16A34A;"><div class="dot" style="background:#16A34A;"></div>Delivered</div>
  <div class="pill" style="background:#EF444420;color:#EF4444;"><div class="dot" style="background:#EF4444;"></div>Cancelled</div>
</div>
<div class="section-label">Chef Floating Tab Bar</div>
<div class="tab-bar">
  <div class="tab tab-active">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard
  </div>
  <div class="tab tab-inactive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  </div>
  <div class="tab tab-inactive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
  </div>
  <div class="tab tab-inactive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
  </div>
  <div class="tab tab-inactive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div>
  <div class="tab tab-inactive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
</div>
</body>
</html>
