<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #FAF7F2; padding: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; }
  .dot  { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .section-label { font-size: 10px; font-weight: 600; color: #B8A898; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

  /* Glass floating tab bar — Chef */
  .glass-bar {
    display: inline-flex; align-items: center; gap: 2px; padding: 6px 8px;
    border-radius: 100px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border: 1px solid rgba(255,255,255,0.75);
    box-shadow: 0 8px 32px rgba(196,98,45,.13), 0 1px 0 rgba(255,255,255,.8) inset;
    margin-bottom: 18px;
  }
  .chef-tab {
    display: flex; flex-direction: row; align-items: center; gap: 6px;
    padding: 9px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 600; color: #6B5040; cursor: pointer;
  }
  .chef-tab.active { background: rgba(196,98,45,.13); color: #C4622D; }
  .chef-tab.active svg { stroke: #C4622D; }
  .chef-label { display: none; }
  .chef-tab.active .chef-label { display: inline; }

  /* Glass floating tab bar — Customer */
  .cust-tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 14px; border-radius: 100px;
    font-size: 10px; font-weight: 600; color: #6B5040; cursor: pointer;
  }
  .cust-tab.active { background: rgba(196,98,45,.13); color: #C4622D; }
  .cust-tab.active svg { stroke: #C4622D; }
</style>
</head>
<body>

<div class="section-label">Order Status Pills</div>
<div class="row">
  <div class="pill" style="background:#D4944A20;color:#D4944A;"><div class="dot" style="background:#D4944A;"></div>Pending</div>
  <div class="pill" style="background:#3B82F620;color:#3B82F6;"><div class="dot" style="background:#3B82F6;"></div>Confirmed</div>
  <div class="pill" style="background:#8B5CF620;color:#8B5CF6;"><div class="dot" style="background:#8B5CF6;"></div>Preparing</div>
  <div class="pill" style="background:#10B98120;color:#10B981;"><div class="dot" style="background:#10B981;"></div>Ready</div>
  <div class="pill" style="background:#C4622D20;color:#C4622D;"><div class="dot" style="background:#C4622D;"></div>On the Way</div>
  <div class="pill" style="background:#16A34A20;color:#16A34A;"><div class="dot" style="background:#16A34A;"></div>Delivered</div>
  <div class="pill" style="background:#C0392B20;color:#C0392B;"><div class="dot" style="background:#C0392B;"></div>Cancelled</div>
</div>

<div class="section-label">Chef App — Floating Glass Tab Bar</div>
<div class="glass-bar" id="chefBar">
  <div class="chef-tab" data-label="Home">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="chef-label">Home</span>
  </div>
  <div class="chef-tab active" data-label="Orders">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
    <span class="chef-label">Orders</span>
  </div>
  <div class="chef-tab" data-label="Menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
    <span class="chef-label">Menu</span>
  </div>
  <div class="chef-tab" data-label="Analytics">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span class="chef-label">Analytics</span>
  </div>
  <div class="chef-tab" data-label="Profile">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="chef-label">Profile</span>
  </div>
</div>

<div class="section-label">Customer App — Floating Glass Tab Bar</div>
<div class="glass-bar" id="custBar">
  <div class="cust-tab active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </div>
  <div class="cust-tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Explore
  </div>
  <div class="cust-tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    Favorites
  </div>
  <div class="cust-tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    Orders
  </div>
  <div class="cust-tab">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B5040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </div>
</div>

<script>
  document.getElementById('chefBar').querySelectorAll('.chef-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.getElementById('chefBar').querySelectorAll('.chef-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });
  document.getElementById('custBar').querySelectorAll('.cust-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.getElementById('custBar').querySelectorAll('.cust-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });
</script>
</body>
</html>
